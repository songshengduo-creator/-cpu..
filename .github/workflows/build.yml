name: Build Magisk Module

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27
        run: |
          echo "y" | sdkmanager "ndk;27.2.12479018"
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Download zygisk.hpp
        run: |
          curl -sSL \
            "https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp" \
            -o zygisk_src/zygisk.hpp

      - name: Build arm64-v8a
        run: |
          cmake -B build_arm64 \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-27 \
            -DCMAKE_BUILD_TYPE=Release \
            zygisk_src
          cmake --build build_arm64 --target cpuinfo_spoofer
          mkdir -p zygisk
          cp build_arm64/libcpuinfo_spoofer.so zygisk/arm64-v8a.so

      - name: Build armeabi-v7a
        run: |
          cmake -B build_arm32 \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-27 \
            -DCMAKE_BUILD_TYPE=Release \
            zygisk_src
          cmake --build build_arm32 --target cpuinfo_spoofer
          cp build_arm32/libcpuinfo_spoofer.so zygisk/armeabi-v7a.so

      - name: Package Magisk Module
        run: |
          zip -r cpuinfo_spoofer.zip \
            module.prop \
            cpuinfo_spoof \
            post-fs-data.sh \
            service.sh \
            META-INF/ \
            zygisk/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpuinfo_spoofer
          path: cpuinfo_spoofer.zip
          retention-days: 7
